{% extends "base.html" %}

{% block title %}პაროლის აღდგენა - choloka.ge{% endblock %}

{% block content %}
<div class="auth-wrapper animate-fade">
    <div class="glass-panel auth-card" style="border-radius: var(--border-radius-md); box-shadow: var(--shadow-lg); background: #ffffff;">
        <div class="auth-header">
            <h1 style="background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-rose) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 28px;"><i class="fa-solid fa-key"></i> პაროლის აღდგენა</h1>
            <p style="color: var(--text-secondary); margin-top: 5px;">შეიყვანეთ თქვენი ელ-ფოსტა აღდგენის კოდის მისაღებად</p>
        </div>
        
        <form action="{{ url_for('recover_password') }}" method="POST">
            <div class="form-group">
                <label for="email"><i class="fa-solid fa-envelope" style="color: var(--accent-blue);"></i> ელ-ფოსტა</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="მაგ: user@example.com" required>
            </div>
            
            <button type="submit" class="btn btn-amber" style="width: 100%; margin-top: 10px;">
                კოდის გაგზავნა <i class="fa-solid fa-paper-plane"></i>
            </button>
        </form>
        
        <div class="auth-footer" style="margin-top: 25px; border-top: 1px solid var(--glass-border); padding-top: 15px;">
            <p><a href="{{ url_for('login') }}" style="font-weight: 600;"><i class="fa-solid fa-arrow-left-long"></i> ავტორიზაციაზე გადასვლა</a></p>
        </div>
    </div>
</div>
{% endblock %}
